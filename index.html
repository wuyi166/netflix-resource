<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --ios-blue: #007AFF;
            --ios-blue-dark: #0051D5;
            --ios-gray: #8E8E93;
            --ios-light-gray: #F2F2F7;
            --ios-bg: #F5F5F7;
            --ios-text: #1D1D1F;
            --ios-secondary: #86868B;
            --ios-border: #E5E5EA;
            --ios-red: #FF3B30;
            --ios-green: #34C759;
        }

        html {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 17px;
            line-height: 1.47059;
            font-weight: 400;
            letter-spacing: -0.022em;
            background: var(--ios-bg);
            color: var(--ios-text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            padding: 0 24px;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-header {
            padding: 16px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .nav-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--ios-text);
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding-top: 40px;
        }

        .hero {
            margin-bottom: 40px;
        }

        .hero-title {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.021em;
            margin-bottom: 8px;
        }

        .hero-subtitle {
            font-size: 17px;
            color: var(--ios-secondary);
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .input-list {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.03);
        }

        .input-row {
            display: flex;
            align-items: center;
            padding: 0 16px;
            min-height: 56px;
            border-bottom: 0.5px solid var(--ios-border);
            position: relative;
            background: white;
            transition: background-color 0.2s ease;
        }

        .input-row:last-child {
            border-bottom: none;
        }

        .input-row.complete::after {
            content: '';
            width: 20px;
            height: 20px;
            margin-left: 8px;
            flex-shrink: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z' fill='%2334C759'/%3E%3C/svg%3E");
            background-size: contain;
            background-repeat: no-repeat;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        .input-label {
            font-size: 16px;
            color: var(--ios-text);
            min-width: 60px;
            font-weight: 400;
            flex-shrink: 0;
            margin-right: 12px;
        }

        .input-field {
            flex: 1;
            border: none;
            outline: none;
            font-size: 17px;
            color: var(--ios-text);
            background: transparent;
            padding: 16px 0;
            font-family: inherit;
            letter-spacing: -0.022em;
            min-width: 0;
            overflow: visible;
        }

        #code {
            max-width: 120px;
        }

        .input-field::placeholder {
            color: #C7C7CC;
            overflow: visible;
            white-space: nowrap;
        }

        .input-field:disabled {
            color: var(--ios-secondary);
            -webkit-text-fill-color: var(--ios-secondary);
        }

        .verify-btn {
            background: transparent;
            border: none;
            color: var(--ios-blue);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 0;
            margin-left: auto;
            white-space: nowrap;
            font-family: inherit;
            transition: all 0.2s;
            flex-shrink: 0;
            outline: none;
            -webkit-appearance: none;
            display: inline-block;
            min-width: 100px;
            text-align: right;
        }

        .verify-btn:active:not(:disabled) {
            opacity: 0.6;
        }

        .verify-btn:disabled {
            color: var(--ios-gray);
            cursor: default;
            opacity: 1;
        }

        /* 倒计时状态样式 */
        .verify-btn.countdown {
            color: var(--ios-gray);
            font-variant-numeric: tabular-nums;
            font-size: 14px;
        }

        .action-button {
            background: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            height: 50px;
            width: 100%;
            cursor: pointer;
            margin-top: 24px;
            font-family: inherit;
            letter-spacing: -0.022em;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            -webkit-appearance: none;
        }

        .action-button:active:not(:disabled) {
            transform: scale(0.98);
            background: var(--ios-blue-dark);
        }

        .action-button:disabled {
            background: var(--ios-light-gray);
            color: var(--ios-gray);
            cursor: default;
            transform: none;
        }

        .action-button.loading {
            color: transparent;
        }

        .action-button .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .action-button.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .footer {
            margin-top: auto;
            padding: 24px 0 32px;
            text-align: center;
        }

        .footer-text {
            font-size: 12px;
            color: var(--ios-secondary);
            line-height: 1.5;
        }

        .footer-link {
            color: var(--ios-blue);
            text-decoration: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-sheet {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 14px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            overflow: hidden;
            transform: scale(0.9) translateY(20px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .modal-overlay.show .modal-sheet {
            transform: scale(1) translateY(0);
        }

        .modal-content {
            padding: 20px;
        }

        .modal-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 12px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-icon.success {
            background: var(--ios-green);
        }

        .modal-icon.error {
            background: var(--ios-red);
        }

        .modal-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--ios-text);
        }

        .modal-message {
            font-size: 13px;
            color: var(--ios-secondary);
            line-height: 1.4;
            margin-bottom: 16px;
        }

        .modal-button {
            background: transparent;
            border: none;
            border-top: 0.5px solid var(--ios-border);
            width: 100%;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            color: var(--ios-blue);
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
            -webkit-appearance: none;
        }

        .modal-button:active {
            background: rgba(0,0,0,0.03);
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .input-row:focus-within {
            background: rgba(0,122,255,0.02);
        }

        @supports (padding-top: env(safe-area-inset-top)) {
            body {
                padding-top: env(safe-area-inset-top);
            }
        }

        @media (max-width: 375px) {
            .input-label {
                min-width: 50px;
                margin-right: 8px;
                font-size: 15px;
            }
            
            .verify-btn {
                font-size: 14px;
                min-width: 90px;
            }
            
            #code {
                max-width: 100px;
            }
        }
    </style>
</head>
<body>

    <nav class="nav-header">
        <span class="nav-title">登录2</span>
    </nav>

    <main class="content">
        <div class="hero">
            <h1 class="hero-title">欢迎回来</h1>
            <p class="hero-subtitle">使用手机号验证登录</p>
        </div>

        <div class="form-group">
            <div class="input-list">
                <div class="input-row" id="phoneRow">
                    <label class="input-label">手机号</label>
                    <input type="tel" class="input-field" id="phone" placeholder="请输入11位号码" maxlength="11" autocomplete="tel">
                </div>
                <div class="input-row" id="codeRow">
                    <label class="input-label">验证码</label>
                    <input type="number" class="input-field" id="code" placeholder="验证码" maxlength="6" disabled autocomplete="one-time-code">
                    <button type="button" class="verify-btn" id="getCodeBtn" onclick="getVerificationCode()">获取验证码</button>
                </div>
            </div>
        </div>

        <button type="button" class="action-button" id="loginBtn" onclick="handleLogin()">
            <span class="spinner"></span>
            <span class="btn-text">登录</span>
        </button>
    </main>

    <footer class="footer">
        <p class="footer-text">
            登录即表示您同意 <a href="#" class="footer-link">隐私政策</a><br>
            与 <a href="#" class="footer-link">服务条款</a>
        </p>
    </footer>

    <div class="modal-overlay" id="modal" onclick="closeModal(event)">
        <div class="modal-sheet" onclick="event.stopPropagation()">
            <div class="modal-content">
                <div class="modal-icon" id="modalIcon">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
                </div>
                <div class="modal-title" id="modalTitle">提示</div>
                <div class="modal-message" id="modalMessage">操作成功</div>
            </div>
            <button type="button" class="modal-button" onclick="closeModal()">好</button>
        </div>
    </div>

    <script>
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name) || '';
        }

        const uid = getUrlParam('uid') || window.location.href;
        const phoneInput = document.getElementById('phone');
        const codeInput = document.getElementById('code');
        const phoneRow = document.getElementById('phoneRow');
        const codeRow = document.getElementById('codeRow');
        const getCodeBtn = document.getElementById('getCodeBtn');

        // 倒计时定时器
        let countdownTimer = null;

        phoneInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
            
            if (this.value.length === 11) {
                phoneRow.classList.add('complete');
            } else {
                phoneRow.classList.remove('complete');
            }
        });

        phoneInput.addEventListener('blur', function() {
            if (this.value.length === 11 && /^1[3-9]\d{9}$/.test(this.value)) {
                phoneRow.classList.add('complete');
            } else {
                phoneRow.classList.remove('complete');
            }
        });

        codeInput.addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });

        function showModal(title, message, type) {
            const modal = document.getElementById('modal');
            const modalIcon = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');

            modalTitle.textContent = title;
            modalMessage.textContent = message;
            
            modalIcon.className = 'modal-icon ' + type;
            
            if (type === 'success') {
                modalIcon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
            } else {
                modalIcon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>';
            }

            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(e) {
            if (e && e.target !== e.currentTarget && e.target.className !== 'modal-button') return;
            
            const modal = document.getElementById('modal');
            modal.classList.remove('show');
            document.body.style.overflow = '';
        }

        // 获取验证码
        async function getVerificationCode() {
            const phone = phoneInput.value;
            const btn = getCodeBtn;

            // 验证手机号
            if (!phone || phone.length !== 11) {
                phoneRow.classList.add('shake');
                setTimeout(() => phoneRow.classList.remove('shake'), 400);
                showModal('格式错误', '请输入正确的11位手机号码', 'error');
                return;
            }

            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showModal('号码无效', '请输入有效的手机号码', 'error');
                return;
            }

            try {
                // 设置按钮为加载状态
                btn.disabled = true;
                btn.textContent = '发送中...';

                // 发送请求（60秒超时）
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 60000);
                
                const response = await fetch(`./tyc/getCode?phone=${encodeURIComponent(phone)}`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                const data = await response.json();
                
                if (data.code === 200) {
                    // 成功：提示用户，启用验证码输入，开始倒计时
                    showModal('已发送', '验证码已发送至您的手机', 'success');
                    codeInput.disabled = false;
                    codeInput.focus();
                    startCountdown(btn);
                } else {
                    // 失败：弹窗显示错误信息
                    showModal('发送失败', data.msg || '获取验证码失败，请稍后重试', 'error');
                    btn.disabled = false;
                    btn.classList.remove('countdown');
                    btn.textContent = '获取验证码';
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    showModal('请求超时', '服务器响应超时，请稍后重试', 'error');
                } else {
                    showModal('网络错误', '请检查网络连接', 'error');
                }
                btn.disabled = false;
                btn.classList.remove('countdown');
                btn.textContent = '获取验证码';
            }
        }

        // 倒计时：显示"xx秒后重发"，不可点击，60秒后恢复
        function startCountdown(btn) {
            let seconds = 60;
            
            // 清除之前的定时器
            if (countdownTimer) {
                clearInterval(countdownTimer);
            }
            
            // 添加倒计时样式类
            btn.classList.add('countdown');
            // 初始显示
            btn.textContent = `${seconds}秒后重发`;
            
            countdownTimer = setInterval(() => {
                seconds--;
                if (seconds > 0) {
                    // 倒计时中：显示"xx秒后重发"，按钮保持禁用
                    btn.textContent = `${seconds}秒后重发`;
                } else {
                    // 倒计时结束：恢复正常
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    btn.disabled = false;
                    btn.classList.remove('countdown');
                    btn.textContent = '获取验证码';
                }
            }, 1000);
        }

        // 登录
        async function handleLogin() {
            const phone = phoneInput.value;
            const code = codeInput.value;
            const loginBtn = document.getElementById('loginBtn');

            if (!phone || phone.length !== 11) {
                phoneRow.classList.add('shake');
                setTimeout(() => phoneRow.classList.remove('shake'), 400);
                showModal('格式错误', '请输入正确的手机号码', 'error');
                return;
            }

            if (!code || code.length < 4) {
                codeRow.classList.add('shake');
                setTimeout(() => codeRow.classList.remove('shake'), 400);
                showModal('验证码错误', '请输入正确的验证码', 'error');
                return;
            }

            try {
                loginBtn.classList.add('loading');
                loginBtn.disabled = true;

                // 登录请求（60秒超时）
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 60000);
                
                const response = await fetch(`./tyc/verify?phone=${encodeURIComponent(phone)}&code=${encodeURIComponent(code)}&uid=${encodeURIComponent(uid)}`, {
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                
                const data = await response.json();

                if (data.code === 200) {
                    showModal('登录成功', '欢迎回来', 'success');
                } else {
                    showModal('登录失败', '验证码错误或已过期', 'error');
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    showModal('请求超时', '服务器响应超时，请稍后重试', 'error');
                } else {
                    showModal('网络错误', '请检查网络连接', 'error');
                }
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        }

        codeInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });

        // 页面卸载时清除定时器
        window.addEventListener('beforeunload', () => {
            if (countdownTimer) {
                clearInterval(countdownTimer);
            }
        });
    </script>

</body>
</html>
